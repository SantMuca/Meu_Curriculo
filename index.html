        };

        const tooltip = document.getElementById('tooltip');
        let currentSlide = 0;

        window.onload = () => updateContent('resumo');

        function updateContent(section) {
            const display = document.getElementById('mainDisplay');
            display.innerHTML = content[section];
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const btnText = section === 'redes' ? 'redes' : section.substring(0,3);
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.innerText.toLowerCase().includes(btnText));
            if(activeBtn) activeBtn.classList.add('active');

            if(section === 'experiencias') {
                currentSlide = 0;
                setupTooltip();
            } else {
                tooltip.style.display = 'none';
            }
        }

        function moveSlide(direction) {
            const slides = document.querySelectorAll('.slide');
            if (slides.length > 0) {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + direction + slides.length) % slides.length;
                slides[currentSlide].classList.add('active');
            }
        }

        document.addEventListener('mousemove', (e) => {
            tooltip.style.left = e.pageX + 15 + 'px';
            tooltip.style.top = e.pageY + 15 + 'px';
        });

        function setupTooltip() {
            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => {
                btn.onmouseenter = () => { if(!btn.classList.contains('active')) tooltip.style.display = 'block'; };
                btn.onmouseleave = () => tooltip.style.display = 'none';
            });
        }
    </script>
</body>
